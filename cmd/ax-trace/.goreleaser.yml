version: 2

project_name: ax-trace

before:
  hooks:
    - go mod download

builds:
  - id: ax-trace
    main: .
    binary: ax-trace
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}

archives:
  - id: ax-trace
    ids: [ax-trace]
    name_template: "ax-trace_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    formats: [tar.gz]
    # Binary-only archives: LICENSE/README live at the repo root, outside this
    # subproject's build dir, and GoReleaser can't glob across `..`. The
    # install script only extracts the binary; LICENSE ships in the repo.
    files: []

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: Arize-ai
    name: coding-harness-tracing
  prerelease: auto
  draft: false
  name_template: "ax-trace {{ .Version }}"
